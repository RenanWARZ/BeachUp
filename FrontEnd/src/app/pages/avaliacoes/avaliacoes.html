<div class="pagina">
  <div class="conteudo-avaliacao">

    <div class="topo-pagina">
      <a class="btn-voltar" (click)="irPara('home')" title="Voltar ao menu">
        <i class="bi bi-arrow-left-circle-fill"></i>
      </a>
    </div>

    <div class="avaliacao-card">
      <span class="avaliacao-tag">BeachUp</span>

      <h1 class="titulo">Faça sua avaliação</h1>

      <p class="subtitulo">
        Sua opinião ajuda outros jogadores a escolherem a melhor quadra.
      </p>

      <input
        type="text"
        placeholder="Seu nome"
        [(ngModel)]="avaliacao.nome"
      />

      <div class="estrelas">
        <input value="5" name="nota" id="estrela5" type="radio" [(ngModel)]="avaliacao.nota" />
        <label for="estrela5"></label>

        <input value="4" name="nota" id="estrela4" type="radio" [(ngModel)]="avaliacao.nota" />
        <label for="estrela4"></label>

        <input value="3" name="nota" id="estrela3" type="radio" [(ngModel)]="avaliacao.nota" />
        <label for="estrela3"></label>

        <input value="2" name="nota" id="estrela2" type="radio" [(ngModel)]="avaliacao.nota" />
        <label for="estrela2"></label>

        <input value="1" name="nota" id="estrela1" type="radio" [(ngModel)]="avaliacao.nota" />
        <label for="estrela1"></label>
      </div>

      <div class="comentario">
        <label class="label-comentario">Comentário</label>

        <textarea
          placeholder="Conte como foi sua experiência..."
          [(ngModel)]="avaliacao.comentario"
        ></textarea>

        <button type="button" (click)="salvar()">
          Enviar avaliação
        </button>
      </div>

      <div class="lista-avaliacoes">
        <h2 class="titulo-lista">Avaliações</h2>

        <div *ngIf="avaliacoes.length === 0" class="sem-avaliacoes">
          Nenhuma avaliação ainda.
        </div>

        <div *ngFor="let a of avaliacoes; let i = index" class="card-avaliacao">
          <h3>{{ a.nome }}</h3>
          <p>{{ a.comentario }}</p>
          <strong>Nota: {{ a.nota }}</strong>

          <div class="acoes-card">
            <button class="btn-editar" (click)="editar(i)">Editar</button>
            <button class="btn-deletar" (click)="deletar(i)">Deletar</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
