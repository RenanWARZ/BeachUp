<div class="create-team-container">


  <div class="form-card">

    <h1>Criar Novo Time</h1>

    <form class="form-create">

      <label>Nome do Time</label>
      <input type="text" placeholder="Ex: Areia Vibes">

      <label>Descrição</label>
      <textarea placeholder="Sobre o time..."></textarea>

      <label>Nível</label>
      <select>
        <option disabled selected>Selecione</option>
        <option>Iniciante</option>
        <option>Intermediário</option>
        <option>Avançado</option>
      </select>

      <label>Máximo de Jogadores</label>

      <div class="checkbox">
        <input type="checkbox" id="privado">
        <label for="privado">Time Privado</label>
      </div>

      <button class="btn-create">Criar Time</button>

    </form>

  </div>

</div>
